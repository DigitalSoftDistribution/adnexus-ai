# ═══════════════════════════════════════════════════════════════════════════════
# AdNexus Backend — Development Docker Compose
# ═══════════════════════════════════════════════════════════════════════════════
# Services:
#   - PostgreSQL 16   — Primary database with persistent volume
#   - Redis 7         — Cache, sessions, and pub/sub
#   - API             — REST API server with hot reload (nodemon)
#   - MCP Server      — Model Context Protocol server
#
# Usage:
#   make dev          Start all services
#   make db           Start databases only
#   make api          Start API only
#   make logs         View logs
#   make stop         Stop all services
# ═══════════════════════════════════════════════════════════════════════════════

version: "3.9"

# ─────────────────────────────────────────────────────────────────────────────
# Services
# ─────────────────────────────────────────────────────────────────────────────
services:
  # ─────────────────────────────────────────────────────────────────────────
  # PostgreSQL — Primary Database
  # ─────────────────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: adnexus-postgres
    restart: unless-stopped
    env_file: .env
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-adnexus}
      POSTGRES_USER: ${POSTGRES_USER:-adnexus}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-devpassword123}
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./docker/postgres/init-scripts:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-adnexus} -d ${POSTGRES_DB:-adnexus}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - adnexus-network
    command: >
      postgres
      -c log_statement=${POSTGRES_LOG_LEVEL:-all}
      -c log_duration=on
      -c log_destination=stderr
      -c max_connections=200
      -c shared_buffers=256MB

  # ─────────────────────────────────────────────────────────────────────────
  # Redis — Cache, Sessions & Pub/Sub
  # ─────────────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: adnexus-redis
    restart: unless-stopped
    env_file: .env
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis-data:/data
      - ./docker/redis/redis.conf:/usr/local/etc/redis/redis.conf:ro
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - adnexus-network
    command: redis-server /usr/local/etc/redis/redis.conf --appendonly yes

  # ─────────────────────────────────────────────────────────────────────────
  # API Server — REST API with Hot Reload
  # ─────────────────────────────────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: Dockerfile.dev
      target: api-dev
    container_name: adnexus-api
    restart: unless-stopped
    env_file: .env
    environment:
      # Override for Docker network
      NODE_ENV: development
      DATABASE_URL: postgresql://${POSTGRES_USER:-adnexus}:${POSTGRES_PASSWORD:-devpassword123}@postgres:5432/${POSTGRES_DB:-adnexus}?schema=public
      REDIS_URL: redis://redis:6379
      API_PORT: ${API_PORT:-3001}
      # Prisma binary targets for Linux Alpine inside container
      PRISMA_CLI_BINARY_TARGETS: linux-musl-arm64-openssl-3.0,linux-musl-openssl-3.0,debian-openssl-3.0.x
      # Hot reload settings
      CHOKIDAR_USEPOLLING: true
      CHOKIDAR_INTERVAL: 1000
    ports:
      - "${API_PORT:-3001}:3001"
      # Debug port (use --inspect=0.0.0.0:9229)
      - "9229:9229"
    volumes:
      # Mount source for hot reload
      - ./:/app:cached
      # Persist node_modules inside container (don't overwrite with host)
      - api-node-modules:/app/node_modules
      # Persist dist for incremental builds
      - api-dist:/app/dist
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3001/health"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 60s
    networks:
      - adnexus-network
    command: >
      npx nodemon
      --watch src
      --ext ts,json,prisma
      --exec "npx ts-node --transpile-only src/server.ts"
    # Or use node --inspect for debugging:
    # command: >
    #   npx nodemon
    #   --watch src
    #   --ext ts,json,prisma
    #   --exec "node --inspect=0.0.0.0:9229 -r ts-node/register src/server.ts"

  # ─────────────────────────────────────────────────────────────────────────
  # MCP Server — Model Context Protocol
  # ─────────────────────────────────────────────────────────────────────────
  mcp:
    build:
      context: .
      dockerfile: Dockerfile.dev
      target: mcp-dev
    container_name: adnexus-mcp
    restart: unless-stopped
    env_file: .env
    environment:
      NODE_ENV: development
      MCP_PORT: ${MCP_PORT:-3002}
      MCP_TRANSPORT: ${MCP_TRANSPORT:-stdio}
      # Connect to shared services
      DATABASE_URL: postgresql://${POSTGRES_USER:-adnexus}:${POSTGRES_PASSWORD:-devpassword123}@postgres:5432/${POSTGRES_DB:-adnexus}?schema=public
      REDIS_URL: redis://redis:6379
      API_BASE_URL: http://api:3001
      # MCP-specific settings
      MCP_ALLOWED_ORIGINS: ${MCP_ALLOWED_ORIGINS:-*}
      MCP_MAX_TOKENS: ${MCP_MAX_TOKENS:-4096}
    ports:
      - "${MCP_PORT:-3002}:3002"
      - "9230:9229"
    volumes:
      - ./:/app:cached
      - mcp-node-modules:/app/node_modules
      - mcp-dist:/app/dist
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3002/health"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 60s
    networks:
      - adnexus-network
    command: >
      npx nodemon
      --watch src
      --ext ts,json
      --exec "npx ts-node --transpile-only src/mcp-server.ts"

  # ─────────────────────────────────────────────────────────────────────────
  # (Optional) Mailhog — Email testing
  # ─────────────────────────────────────────────────────────────────────────
  mailhog:
    image: mailhog/mailhog:latest
    container_name: adnexus-mailhog
    restart: unless-stopped
    ports:
      - "${MAILHOG_SMTP_PORT:-1025}:1025"
      - "${MAILHOG_UI_PORT:-8025}:8025"
    networks:
      - adnexus-network
    profiles:
      - mail

  # ─────────────────────────────────────────────────────────────────────────
  # (Optional) MinIO — S3-compatible local storage
  # ─────────────────────────────────────────────────────────────────────────
  minio:
    image: minio/minio:latest
    container_name: adnexus-minio
    restart: unless-stopped
    env_file: .env
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin123}
    ports:
      - "${MINIO_API_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    volumes:
      - minio-data:/data
    networks:
      - adnexus-network
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    profiles:
      - storage

  # ─────────────────────────────────────────────────────────────────────────
  # (Optional) Prometheus — Metrics collection
  # ─────────────────────────────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:latest
    container_name: adnexus-prometheus
    restart: unless-stopped
    ports:
      - "${PROMETHEUS_PORT:-9090}:9090"
    volumes:
      - ./docker/prometheus/prometheus.dev.yml:/etc/prometheus/prometheus.yml:ro
    networks:
      - adnexus-network
    profiles:
      - observability

  # ─────────────────────────────────────────────────────────────────────────
  # (Optional) Grafana — Metrics visualization
  # ─────────────────────────────────────────────────────────────────────────
  grafana:
    image: grafana/grafana:latest
    container_name: adnexus-grafana
    restart: unless-stopped
    env_file: .env
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-admin}
      GF_INSTALL_PLUGINS: grafana-clock-panel
    ports:
      - "${GRAFANA_PORT:-3000}:3000"
    volumes:
      - grafana-data:/var/lib/grafana
      - ./docker/grafana/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./docker/grafana/datasources:/etc/grafana/provisioning/datasources:ro
    networks:
      - adnexus-network
    profiles:
      - observability
    depends_on:
      - prometheus

# ─────────────────────────────────────────────────────────────────────────────
# Volumes
# ─────────────────────────────────────────────────────────────────────────────
volumes:
  postgres-data:
    driver: local
  redis-data:
    driver: local
  api-node-modules:
    driver: local
  api-dist:
    driver: local
  mcp-node-modules:
    driver: local
  mcp-dist:
    driver: local
  minio-data:
    driver: local
  grafana-data:
    driver: local

# ─────────────────────────────────────────────────────────────────────────────
# Networks
# ─────────────────────────────────────────────────────────────────────────────
networks:
  adnexus-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16
