# =============================================================================
# AdNexus Full-Stack Docker Compose
# =============================================================================
# Orchestrates the entire AdNexus backend: PostgreSQL, Redis, API server,
# MCP server, and background workers.
#
# Usage:
#   docker compose up -d              # Start all services
#   docker compose logs -f api        # Tail API logs
#   docker compose down -v            # Stop and remove volumes
#   docker compose ps                 # Check service status
# =============================================================================

name: adnexus

services:
  # ---------------------------------------------------------------------------
  # PostgreSQL 16 — Primary database
  # ---------------------------------------------------------------------------
  postgres:
    image: postgres:16-alpine
    container_name: adnexus-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: adnexus
      POSTGRES_USER: adnexus
      POSTGRES_PASSWORD: ${DB_PASSWORD:-adnexus123}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
      - ./database/seed.sql:/docker-entrypoint-initdb.d/02-seed.sql:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U adnexus -d adnexus"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - adnexus-network

  # ---------------------------------------------------------------------------
  # Redis 7 — Cache + Job Queue (BullMQ)
  # ---------------------------------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: adnexus-redis
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 5s
    networks:
      - adnexus-network

  # ---------------------------------------------------------------------------
  # AdNexus API Server — Node.js/Express REST API
  # ---------------------------------------------------------------------------
  api:
    build:
      context: ./api
      dockerfile: Dockerfile
      target: production
    container_name: adnexus-api
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      # App
      NODE_ENV: production
      PORT: 3000

      # Database
      DATABASE_URL: postgresql://adnexus:${DB_PASSWORD:-adnexus123}@postgres:5432/adnexus

      # Cache / Queue
      REDIS_URL: redis://redis:6379

      # Supabase
      SUPABASE_URL: ${SUPABASE_URL}
      SUPABASE_SERVICE_KEY: ${SUPABASE_SERVICE_KEY}

      # Authentication
      JWT_SECRET: ${JWT_SECRET}

      # Meta (Facebook) Ads
      META_APP_ID: ${META_APP_ID}
      META_APP_SECRET: ${META_APP_SECRET}

      # Google Ads
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
      GOOGLE_DEVELOPER_TOKEN: ${GOOGLE_DEVELOPER_TOKEN}

      # TikTok Ads
      TIKTOK_APP_ID: ${TIKTOK_APP_ID}
      TIKTOK_APP_SECRET: ${TIKTOK_APP_SECRET}

      # Snapchat Ads
      SNAP_CLIENT_ID: ${SNAP_CLIENT_ID}
      SNAP_CLIENT_SECRET: ${SNAP_CLIENT_SECRET}

      # Stripe Payments
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET}

      # AI / LLM
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}

      # Email
      RESEND_API_KEY: ${RESEND_API_KEY}

      # CORS
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:5173}

      # MCP
      MCP_API_KEY: ${MCP_API_KEY}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    networks:
      - adnexus-network

  # ---------------------------------------------------------------------------
  # MCP Server — Model Context Protocol for AI integrations
  # ---------------------------------------------------------------------------
  mcp-server:
    build:
      context: ./mcp-server
      dockerfile: Dockerfile
      target: production
    container_name: adnexus-mcp-server
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      ADNEXUS_API_URL: http://api:3000/api/v1
      ADNEXUS_MCP_API_KEY: ${MCP_API_KEY}
      SUPABASE_URL: ${SUPABASE_URL}
      SUPABASE_SERVICE_KEY: ${SUPABASE_SERVICE_KEY}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health')\""]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    networks:
      - adnexus-network

  # ---------------------------------------------------------------------------
  # Background Workers — BullMQ job processors
  # ---------------------------------------------------------------------------
  workers:
    build:
      context: ./api
      dockerfile: Dockerfile
      target: production
    container_name: adnexus-workers
    restart: unless-stopped
    command: ["node", "dist/workers/index.js"]
    environment:
      # App
      NODE_ENV: production
      WORKER_MODE: "true"

      # Database
      DATABASE_URL: postgresql://adnexus:${DB_PASSWORD:-adnexus123}@postgres:5432/adnexus

      # Cache / Queue
      REDIS_URL: redis://redis:6379

      # Supabase
      SUPABASE_URL: ${SUPABASE_URL}
      SUPABASE_SERVICE_KEY: ${SUPABASE_SERVICE_KEY}

      # Authentication
      JWT_SECRET: ${JWT_SECRET}

      # Ad Platform Credentials
      META_APP_ID: ${META_APP_ID}
      META_APP_SECRET: ${META_APP_SECRET}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
      GOOGLE_DEVELOPER_TOKEN: ${GOOGLE_DEVELOPER_TOKEN}
      TIKTOK_APP_ID: ${TIKTOK_APP_ID}
      TIKTOK_APP_SECRET: ${TIKTOK_APP_SECRET}
      SNAP_CLIENT_ID: ${SNAP_CLIENT_ID}
      SNAP_CLIENT_SECRET: ${SNAP_CLIENT_SECRET}

      # Payments
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET}

      # AI / LLM
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}

      # Email
      RESEND_API_KEY: ${RESEND_API_KEY}

      # MCP
      MCP_API_KEY: ${MCP_API_KEY}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - adnexus-network

# =============================================================================
# Named Volumes
# =============================================================================
volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local

# =============================================================================
# Networks
# =============================================================================
networks:
  adnexus-network:
    driver: bridge
