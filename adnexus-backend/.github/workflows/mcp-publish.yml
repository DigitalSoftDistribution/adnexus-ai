name: MCP Server Publish

on:
  push:
    branches: [main]
    paths:
      - 'mcp-server/**'
      - '.github/workflows/mcp-publish.yml'
  workflow_dispatch:

concurrency:
  group: mcp-publish
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  MCP_IMAGE: ghcr.io/${{ github.repository_owner }}/adnexus-mcp

jobs:
  # ------------------------------------------------------------------
  # 1. Build MCP Docker Image
  # ------------------------------------------------------------------
  build:
    name: Build MCP Image
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    permissions:
      contents: read
      packages: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@b5ca514318bd6ebac0fb2aedd5d36ec1b5c232a2 # v3.10.0

      - name: Cache Docker layers
        uses: actions/cache@5a3ec84eff668545956fd18022155c47e93e2684 # v4.2.3
        with:
          path: /tmp/.buildx-cache-mcp
          key: ${{ runner.os }}-buildx-mcp-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-buildx-mcp-

      - name: Build Docker image (MCP server)
        uses: docker/build-push-action@14487ce63c7a62a4a324b0bfb37086795e31c6c0 # v6.16.0
        with:
          context: ./mcp-server
          file: ./mcp-server/Dockerfile
          push: false
          load: true
          tags: adnexus-mcp:ci-build
          cache-from: type=local,src=/tmp/.buildx-cache-mcp
          cache-to: type=local,dest=/tmp/.buildx-cache-mcp-new,mode=max
          provenance: false

      - name: Move Docker cache
        run: |
          rm -rf /tmp/.buildx-cache-mcp
          mv /tmp/.buildx-cache-mcp-new /tmp/.buildx-cache-mcp

      - name: Scan image for vulnerabilities
        uses: aquasecurity/trivy-action@6c175e9c4083a92bbca2f0724d242eb7f407421b # 0.30.0
        with:
          image-ref: adnexus-mcp:ci-build
          format: table
          severity: CRITICAL,HIGH
          exit-code: 1
          ignore-unfixed: true

      - name: Run smoke test
        run: |
          docker run -d --name mcp-smoke-test -p 3001:3001 adnexus-mcp:ci-build
          sleep 10
          for attempt in 1 2 3; do
            echo "Smoke test attempt $attempt..."
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:3001/health --connect-timeout 5 --max-time 10 || echo "000")
            if [ "$STATUS" = "200" ]; then
              echo "Smoke test passed!"
              docker stop mcp-smoke-test
              docker rm mcp-smoke-test
              exit 0
            fi
            echo "Smoke test returned HTTP $STATUS, retrying in 5s..."
            sleep 5
          done
          docker logs mcp-smoke-test || true
          docker stop mcp-smoke-test || true
          docker rm mcp-smoke-test || true
          echo "Smoke test failed after 3 attempts"
          exit 1

  # ------------------------------------------------------------------
  # 2. Push to GitHub Container Registry
  # ------------------------------------------------------------------
  push:
    name: Push to GHCR
    needs: [build]
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    permissions:
      contents: read
      packages: write

    outputs:
      image-tag: ${{ steps.meta.outputs.tags }}
      image-digest: ${{ steps.push.outputs.digest }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@b5ca514318bd6ebac0fb2aedd5d36ec1b5c232a2 # v3.10.0

      - name: Login to GitHub Container Registry
        uses: docker/login-action@74a5d142397b4f367a81961eba4e8cd7edddf772 # v3.4.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@902fa8ec7d6ecbf8d84d538b9b233a880f4287a6 # v5.7.0
        with:
          images: ${{ env.MCP_IMAGE }}
          tags: |
            type=raw,value=mcp-${{ github.run_number }}-${{ github.run_attempt }}
            type=sha,prefix=,format=short
            type=raw,value=mcp-latest

      - name: Cache Docker layers
        uses: actions/cache@5a3ec84eff668545956fd18022155c47e93e2684 # v4.2.3
        with:
          path: /tmp/.buildx-cache-mcp-push
          key: ${{ runner.os }}-buildx-mcp-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-buildx-mcp-

      - name: Build and push MCP image
        id: push
        uses: docker/build-push-action@14487ce63c7a62a4a324b0bfb37086795e31c6c0 # v6.16.0
        with:
          context: ./mcp-server
          file: ./mcp-server/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=local,src=/tmp/.buildx-cache-mcp-push
          cache-to: type=local,dest=/tmp/.buildx-cache-mcp-push-new,mode=max
          provenance: true
          sbom: true

      - name: Move Docker cache
        run: |
          rm -rf /tmp/.buildx-cache-mcp-push
          mv /tmp/.buildx-cache-mcp-push-new /tmp/.buildx-cache-mcp-push

  # ------------------------------------------------------------------
  # 3. Deploy MCP Server
  # ------------------------------------------------------------------
  deploy:
    name: Deploy MCP Server
    needs: [push]
    runs-on: ubuntu-24.04
    timeout-minutes: 15

    permissions:
      contents: read
      packages: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Setup kubectl
        uses: azure/setup-kubectl@3e0aecbd2ea0e5e58d5e17a5138e6cabc5d91d5e # v4.0.0
        with:
          version: v1.31.0

      - name: Configure kubeconfig (Production)
        if: github.ref == 'refs/heads/main'
        env:
          PROD_KUBECONFIG: ${{ secrets.PROD_KUBECONFIG }}
        run: |
          mkdir -p ~/.kube
          echo "$PROD_KUBECONFIG" | base64 -d > ~/.kube/config
          chmod 600 ~/.kube/config

      - name: Configure kubeconfig (Staging)
        if: github.ref == 'refs/heads/develop'
        env:
          STAGING_KUBECONFIG: ${{ secrets.STAGING_KUBECONFIG }}
        run: |
          mkdir -p ~/.kube
          echo "$STAGING_KUBECONFIG" | base64 -d > ~/.kube/config
          chmod 600 ~/.kube/config

      - name: Deploy MCP server
        env:
          MCP_IMAGE_DIGEST: ${{ needs.push.outputs.image-digest }}
        run: |
          kubectl set image deployment/adnexus-mcp \
            mcp=${{ env.MCP_IMAGE }}@${MCP_IMAGE_DIGEST} \
            --record
          kubectl rollout status deployment/adnexus-mcp --timeout=300s

      - name: Health check
        run: |
          sleep 10
          kubectl port-forward deployment/adnexus-mcp 8081:3001 &
          PF_PID=$!
          sleep 5
          for attempt in 1 2 3; do
            echo "Health check attempt $attempt..."
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:8081/health --connect-timeout 5 --max-time 10 || echo "000")
            if [ "$STATUS" = "200" ]; then
              echo "MCP server health check passed!"
              kill $PF_PID 2>/dev/null || true
              exit 0
            fi
            echo "Health check returned HTTP $STATUS, retrying in 10s..."
            sleep 10
          done
          kill $PF_PID 2>/dev/null || true
          echo "MCP server health check failed after 3 attempts"
          exit 1

      - name: Rollback on failure
        if: failure()
        run: |
          echo "MCP deployment failed. Rolling back..."
          kubectl rollout undo deployment/adnexus-mcp
          kubectl rollout status deployment/adnexus-mcp --timeout=120s
          echo "Rollback completed"