name: Deploy to Production

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to deploy (e.g., v1.2.3)'
        required: true

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  DEPLOY_ENV: production

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  # ========================================================================
  # Verify Pre-conditions
  # ========================================================================
  verify:
    name: Verify Release
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Verify on main branch with tag
        run: |
          if [[ "${{ github.ref }}" != refs/tags/v* ]]; then
            echo "::error::Production deployments must be triggered by a version tag (v*)"
            exit 1
          fi
          echo "Tag verified: ${{ github.ref_name }}"

      - name: Verify CI passed for this commit
        run: |
          echo "Checking CI status for commit ${{ github.sha }}..."
          # The fact that this workflow is running means CI workflow passed
          # (required by branch protection rules)
          echo "CI verification passed"

  # ========================================================================
  # Generate Release Notes
  # ========================================================================
  release-notes:
    name: Generate Release Notes
    runs-on: ubuntu-latest
    needs: [verify]
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate changelog
        id: changelog
        run: |
          LATEST_TAG=$(git describe --tags --abbrev=0 HEAD~1 2>/dev/null || echo "")
          if [ -n "$LATEST_TAG" ]; then
            echo "changes<<EOF" >> $GITHUB_OUTPUT
            git log --pretty=format:"- %s (%h)" ${LATEST_TAG}..HEAD >> $GITHUB_OUTPUT
            echo "" >> $GITHUB_OUTPUT
            echo "EOF" >> $GITHUB_OUTPUT
          else
            echo "changes<<EOF" >> $GITHUB_OUTPUT
            git log --pretty=format:"- %s (%h)" -10 >> $GITHUB_OUTPUT
            echo "" >> $GITHUB_OUTPUT
            echo "EOF" >> $GITHUB_OUTPUT
          fi

      - name: Create GitHub Release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ github.ref_name }}
          release_name: Release ${{ github.ref_name }}
          body: |
            ## Changes in ${{ github.ref_name }}
            ${{ steps.changelog.outputs.changes }}
            ---
            Deployed at: $(date -u +'%Y-%m-%d %H:%M UTC')
          draft: false
          prerelease: false

  # ========================================================================
  # Build & Push Docker Images
  # ========================================================================
  build-and-push:
    name: Build & Push Images
    runs-on: ubuntu-latest
    timeout-minutes: 45
    needs: [verify]

    permissions:
      contents: read
      packages: write

    strategy:
      matrix:
        service:
          - name: backend
            dockerfile: ./Dockerfile
            context: .
          - name: mcp-server
            dockerfile: ./mcp-server/Dockerfile
            context: ./mcp-server
          - name: worker
            dockerfile: ./Dockerfile.worker
            context: .

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/${{ matrix.service.name }}
          tags: |
            type=semver,pattern={{version}},value=${{ github.ref_name }}
            type=semver,pattern={{major}}.{{minor}},value=${{ github.ref_name }}
            type=sha,prefix=,suffix=,format=short
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
            type=raw,value=${{ github.ref_name }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.service.context }}
          file: ${{ matrix.service.dockerfile }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            BUILD_DATE=${{ github.event.repository.updated_at }}
            VCS_REF=${{ github.sha }}
            VERSION=${{ github.ref_name }}
          platforms: linux/amd64,linux/arm64

  # ========================================================================
  # Blue-Green Deployment
  # ========================================================================
  deploy-blue-green:
    name: Blue-Green Deployment
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: [build-and-push]
    environment:
      name: production
      url: https://adnexus.ai

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Determine active environment
        id: active-env
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.PROD_HOST }}
          username: ${{ secrets.PROD_USER }}
          key: ${{ secrets.PROD_SSH_KEY }}
          port: ${{ secrets.PROD_SSH_PORT || '22' }}
          script_stop: true
          script: |
            set -euo pipefail
            cd /opt/adnexus/production

            # Determine which environment is currently active
            if docker compose -f docker-compose.prod.yml ps backend-blue | grep -q "Up"; then
              ACTIVE="blue"
              NEXT="green"
            else
              ACTIVE="green"
              NEXT="blue"
            fi

            echo "active=$ACTIVE" >> $GITHUB_OUTPUT
            echo "next=$NEXT" >> $GITHUB_OUTPUT
            echo "Current active: $ACTIVE, deploying to: $NEXT"
        env:
          GITHUB_OUTPUT: /tmp/deploy-output.txt

      - name: Backup database before migration
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.PROD_HOST }}
          username: ${{ secrets.PROD_USER }}
          key: ${{ secrets.PROD_SSH_KEY }}
          port: ${{ secrets.PROD_SSH_PORT || '22' }}
          script_stop: true
          script: |
            set -euo pipefail
            BACKUP_DIR="/opt/adnexus/backups"
            TIMESTAMP=$(date +%Y%m%d_%H%M%S)
            BACKUP_FILE="$BACKUP_DIR/pre_deploy_${TIMESTAMP}_${{ github.ref_name }}.sql"

            mkdir -p "$BACKUP_DIR"
            echo "Creating database backup: $BACKUP_FILE"

            docker exec adnexus-postgres pg_dump \
              -U ${{ secrets.DB_USER }} \
              -d ${{ secrets.DB_NAME }} \
              --no-owner --no-acl > "$BACKUP_FILE"

            gzip "$BACKUP_FILE"
            echo "Backup complete: ${BACKUP_FILE}.gz"

            # Keep only last 10 backups
            ls -t $BACKUP_DIR/*.sql.gz | tail -n +11 | xargs -r rm -f

      - name: Deploy to inactive environment
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.PROD_HOST }}
          username: ${{ secrets.PROD_USER }}
          key: ${{ secrets.PROD_SSH_KEY }}
          port: ${{ secrets.PROD_SSH_PORT || '22' }}
          script_stop: true
          script: |
            set -euo pipefail
            cd /opt/adnexus/production

            NEXT="${{ steps.active-env.outputs.next }}"
            VERSION="${{ github.ref_name }}"

            echo "=== Deploying to $NEXT environment ==="

            # Export images for the target environment
            export BACKEND_IMAGE="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/backend:$VERSION"
            export MCP_IMAGE="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/mcp-server:$VERSION"
            export WORKER_IMAGE="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/worker:$VERSION"
            export DEPLOY_COLOR="$NEXT"
            export VERSION="$VERSION"

            echo "Pulling images..."
            docker login ${{ env.REGISTRY }} -u ${{ github.actor }} -p ${{ secrets.GITHUB_TOKEN }}
            docker compose -f docker-compose.prod.yml pull

            echo "Running database migrations..."
            if ! docker compose -f docker-compose.prod.yml run --rm migrate; then
              echo "::error::Database migration failed!"
              exit 1
            fi

            echo "Starting $NEXT environment..."
            docker compose -f docker-compose.prod.yml up -d "backend-$NEXT" "mcp-$NEXT"

            echo "Waiting for $NEXT to be healthy..."
            sleep 15

            # Health check with retry
            HEALTHY=false
            for i in {1..30}; do
              STATUS=$(docker inspect --format='{{.State.Health.Status}}' "adnexus-backend-$NEXT" 2>/dev/null || echo "unknown")
              echo "Health check $i/30: $STATUS"

              if [ "$STATUS" = "healthy" ]; then
                HEALTHY=true
                break
              fi

              if [ "$STATUS" = "unhealthy" ]; then
                echo "::error::Container is unhealthy!"
                exit 1
              fi

              sleep 5
            done

            if [ "$HEALTHY" != "true" ]; then
              echo "::error::Health check timeout!"
              exit 1
            fi

            echo "=== $NEXT environment is healthy ==="

      - name: Run smoke tests on inactive environment
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.PROD_HOST }}
          username: ${{ secrets.PROD_USER }}
          key: ${{ secrets.PROD_SSH_KEY }}
          port: ${{ secrets.PROD_SSH_PORT || '22' }}
          script_stop: true
          script: |
            set -euo pipefail
            NEXT="${{ steps.active-env.outputs.next }}"

            # Determine port based on environment
            if [ "$NEXT" = "blue" ]; then
              PORT=3001
            else
              PORT=3002
            fi

            echo "Running smoke tests on $NEXT (port $PORT)..."

            # Health endpoint
            for i in {1..10}; do
              STATUS=$(curl -sf -o /dev/null -w "%{http_code}" http://localhost:$PORT/health || echo "000")
              echo "Attempt $i/10: HTTP $STATUS"
              if [ "$STATUS" = "200" ]; then
                echo "Smoke test passed!"
                break
              fi
              sleep 3
            done

            if [ "$STATUS" != "200" ]; then
              echo "::error::Smoke tests failed!"
              exit 1
            fi

            # API health check
            API_STATUS=$(curl -sf -o /dev/null -w "%{http_code}" \
              http://localhost:$PORT/api/v1/health || echo "000")

            if [ "$API_STATUS" != "200" ]; then
              echo "::error::API health check failed: HTTP $API_STATUS"
              exit 1
            fi

            echo "All smoke tests passed!"

      - name: Switch traffic (blue-green swap)
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.PROD_HOST }}
          username: ${{ secrets.PROD_USER }}
          key: ${{ secrets.PROD_SSH_KEY }}
          port: ${{ secrets.PROD_SSH_PORT || '22' }}
          script_stop: true
          script: |
            set -euo pipefail
            cd /opt/adnexus/production

            ACTIVE="${{ steps.active-env.outputs.active }}"
            NEXT="${{ steps.active-env.outputs.next }}"

            echo "=== Switching traffic from $ACTIVE to $NEXT ==="

            # Update nginx upstream to point to new environment
            if [ "$NEXT" = "blue" ]; then
              NEW_PORT=3001
            else
              NEW_PORT=3002
            fi

            # Update nginx configuration
            sed -i "s/proxy_pass http:\/\/localhost:3[0-9][0-9][0-9];/proxy_pass http:\/\/localhost:${NEW_PORT};/g" \
              /opt/adnexus/nginx/upstream.conf

            # Reload nginx gracefully
            docker exec adnexus-nginx nginx -s reload

            echo "Traffic switched to $NEXT (port $NEW_PORT)"

            # Wait for traffic to stabilize
            sleep 10

            # Start workers on new environment
            docker compose -f docker-compose.prod.yml up -d "worker-$NEXT"

            echo "=== Traffic switch complete ==="

      - name: Cleanup old environment
        uses: appleboy/ssh-action@v1.0.0
        if: success()
        with:
          host: ${{ secrets.PROD_HOST }}
          username: ${{ secrets.PROD_USER }}
          key: ${{ secrets.PROD_SSH_KEY }}
          port: ${{ secrets.PROD_SSH_PORT || '22' }}
          script: |
            set -euo pipefail
            cd /opt/adnexus/production

            ACTIVE="${{ steps.active-env.outputs.active }}"
            NEXT="${{ steps.active-env.outputs.next }}"

            echo "Stopping old $ACTIVE environment..."
            docker compose -f docker-compose.prod.yml stop "backend-$ACTIVE" "mcp-$ACTIVE" "worker-$ACTIVE" || true

            echo "Old environment stopped. Rollback available if needed."

  # ========================================================================
  # Verify Production Health
  # ========================================================================
  verify-production:
    name: Verify Production
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [deploy-blue-green]

    steps:
      - name: Wait for deployment to stabilize
        run: sleep 30

      - name: Production health check
        run: |
          for i in {1..12}; do
            STATUS=$(curl -sf -o /dev/null -w "%{http_code}" https://adnexus.ai/health || echo "000")
            echo "Health check $i/12: HTTP $STATUS"
            if [ "$STATUS" = "200" ]; then
              echo "Production is healthy!"
              exit 0
            fi
            sleep 5
          done
          echo "::error::Production health check failed!"
          exit 1

      - name: Deep health verification
        run: |
          # Check API endpoints
          curl -sf https://adnexus.ai/api/v1/health > /dev/null || exit 1
          echo "API health: OK"

          # Check response time
          RESPONSE_TIME=$(curl -sf -o /dev/null -w "%{time_total}" https://adnexus.ai/health)
          echo "Response time: ${RESPONSE_TIME}s"

          # Alert if response time > 2s
          if (( $(echo "$RESPONSE_TIME > 2.0" | bc -l) )); then
            echo "::warning::High response time detected: ${RESPONSE_TIME}s"
          fi

  # ========================================================================
  # Rollback on Failure
  # ========================================================================
  rollback:
    name: Rollback on Failure
    runs-on: ubuntu-latest
    needs: [deploy-blue-green]
    if: failure()

    steps:
      - name: Rollback to previous environment
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.PROD_HOST }}
          username: ${{ secrets.PROD_USER }}
          key: ${{ secrets.PROD_SSH_KEY }}
          port: ${{ secrets.PROD_SSH_PORT || '22' }}
          script: |
            set -euo pipefail
            cd /opt/adnexus/production

            ACTIVE="${{ steps.active-env.outputs.active }}"
            NEXT="${{ steps.active-env.outputs.next }}"

            echo "!!! DEPLOYMENT FAILED - Initiating rollback !!!"
            echo "Switching traffic back to $ACTIVE..."

            # Restore previous nginx configuration
            if [ "$ACTIVE" = "blue" ]; then
              PORT=3001
            else
              PORT=3002
            fi

            sed -i "s/proxy_pass http:\/\/localhost:3[0-9][0-9][0-9];/proxy_pass http:\/\/localhost:${PORT};/g" \
              /opt/adnexus/nginx/upstream.conf

            docker exec adnexus-nginx nginx -s reload

            # Ensure old environment is running
            docker compose -f docker-compose.prod.yml start "backend-$ACTIVE" "mcp-$ACTIVE" "worker-$ACTIVE"

            echo "!!! Rollback complete - traffic restored to $ACTIVE !!!"
            exit 1

  # ========================================================================
  # Notify Slack
  # ========================================================================
  notify:
    name: Notify Slack
    runs-on: ubuntu-latest
    needs: [deploy-blue-green, verify-production]
    if: always()

    steps:
      - name: Notify Slack - Success
        if: needs.deploy-blue-green.result == 'success' && needs.verify-production.result == 'success'
        uses: slackapi/slack-github-action@v1.24.0
        with:
          payload: |
            {
              "text": "✅ Production deployment successful: ${{ github.ref_name }}",
              "blocks": [
                {
                  "type": "header",
                  "text": {
                    "type": "plain_text",
                    "text": "✅ Production Deployment Successful"
                  }
                },
                {
                  "type": "section",
                  "fields": [
                    {"type": "mrkdwn", "text": "*Version:* ${{ github.ref_name }}"},
                    {"type": "mrkdwn", "text": "*Commit:* ${{ github.sha }}"},
                    {"type": "mrkdwn", "text": "*By:* ${{ github.actor }}"},
                    {"type": "mrkdwn", "text": "*Environment:* Production"}
                  ]
                },
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "<https://adnexus.ai|View Production> | <${{ github.server_url }}/${{ github.repository }}/releases/tag/${{ github.ref_name }}|Release Notes>"
                  }
                }
              ]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}

      - name: Notify Slack - Failure
        if: needs.deploy-blue-green.result == 'failure' || needs.verify-production.result == 'failure'
        uses: slackapi/slack-github-action@v1.24.0
        with:
          payload: |
            {
              "text": "❌ Production deployment FAILED: ${{ github.ref_name }}",
              "blocks": [
                {
                  "type": "header",
                  "text": {
                    "type": "plain_text",
                    "text": "❌ Production Deployment FAILED"
                  }
                },
                {
                  "type": "section",
                  "fields": [
                    {"type": "mrkdwn", "text": "*Version:* ${{ github.ref_name }}"},
                    {"type": "mrkdwn", "text": "*Commit:* ${{ github.sha }}"},
                    {"type": "mrkdwn", "text": "*By:* ${{ github.actor }}"},
                    {"type": "mrkdwn", "text": "*Status:* ROLLBACK TRIGGERED"}
                  ]
                },
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "<${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|View Failed Run>"
                  }
                }
              ]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}

      - name: PagerDuty alert on failure
        if: needs.deploy-blue-green.result == 'failure' || needs.verify-production.result == 'failure'
        run: |
          curl -X POST https://events.pagerduty.com/v2/enqueue \
            -H "Content-Type: application/json" \
            -d '{
              "routing_key": "${{ secrets.PAGERDUTY_KEY }}",
              "event_action": "trigger",
              "payload": {
                "summary": "Production deployment failed: ${{ github.ref_name }}",
                "severity": "critical",
                "source": "github-actions",
                "custom_details": {
                  "repository": "${{ github.repository }}",
                  "commit": "${{ github.sha }}",
                  "actor": "${{ github.actor }}",
                  "run_url": "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
                }
              }
            }'
