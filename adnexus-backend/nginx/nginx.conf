# ============================================================================
# AdNexus Backend — Nginx Production Configuration
# ============================================================================
# Main nginx.conf — includes server blocks for API, MCP, static frontend,
# SSL termination, gzip compression, and rate limiting.
# ============================================================================

# ---------------------------------------------------------------------------
# User & Process
# ---------------------------------------------------------------------------
user nginx;
worker_processes auto;
worker_rlimit_nofile 65535;

error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

# ---------------------------------------------------------------------------
# Events
# ---------------------------------------------------------------------------
events {
    worker_connections 8192;
    use epoll;
    multi_accept on;
}

# ---------------------------------------------------------------------------
# HTTP Block
# ---------------------------------------------------------------------------
http {
    # ------------------------------------------------------------------------
    # MIME Types
    # ------------------------------------------------------------------------
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # ------------------------------------------------------------------------
    # Logging Format
    # ------------------------------------------------------------------------
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for" '
                    'rt=$request_time uct="$upstream_connect_time" '
                    'uht="$upstream_header_time" urt="$upstream_response_time"';

    access_log /var/log/nginx/access.log main buffer=32k flush=5s;

    # ------------------------------------------------------------------------
    # Performance Tuning
    # ------------------------------------------------------------------------
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    types_hash_max_size 2048;
    server_tokens off;

    # Keepalive
    keepalive_timeout 65;
    keepalive_requests 1000;

    # Connection limits
    limit_conn_zone $binary_remote_addr zone=addr:10m;
    limit_conn addr 50;

    # ------------------------------------------------------------------------
    # Client Body / Header Limits
    # ------------------------------------------------------------------------
    client_max_body_size 50m;
    client_body_buffer_size 128k;
    client_header_buffer_size 4k;
    large_client_header_buffers 4 8k;

    # ------------------------------------------------------------------------
    # Timeouts
    # ------------------------------------------------------------------------
    client_body_timeout 30s;
    client_header_timeout 30s;
    send_timeout 30s;

    # ------------------------------------------------------------------------
    # Rate Limiting Zones
    # ------------------------------------------------------------------------
    # General API rate limit: 100 requests/minute per IP
    limit_req_zone $binary_remote_addr zone=api_general:10m rate=100r/m;

    # Strict API rate limit: 20 requests/minute per IP (sensitive endpoints)
    limit_req_zone $binary_remote_addr zone=api_strict:10m rate=20r/m;

    # MCP server rate limit: 60 requests/minute per IP
    limit_req_zone $binary_remote_addr zone=mcp_general:10m rate=60r/m;

    # Upload rate limit: 10 uploads/minute per IP
    limit_req_zone $binary_remote_addr zone=upload:10m rate=10r/m;

    # ------------------------------------------------------------------------
    # Gzip Compression
    # ------------------------------------------------------------------------
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 1024;
    gzip_buffers 16 8k;
    gzip_http_version 1.1;
    gzip_types
        text/plain
        text/css
        text/javascript
        text/xml
        application/javascript
        application/json
        application/xml
        application/xml+rss
        application/atom+xml
        image/svg+xml
        font/woff2
        font/woff
        font/ttf;

    # ------------------------------------------------------------------------
    # Brotli Compression (if module available)
    # ------------------------------------------------------------------------
    brotli on;
    brotli_comp_level 6;
    brotli_types
        text/plain
        text/css
        text/javascript
        text/xml
        application/javascript
        application/json
        application/xml
        application/xml+rss
        application/atom+xml
        image/svg+xml;

    # ------------------------------------------------------------------------
    # Proxy Settings (shared defaults)
    # ------------------------------------------------------------------------
    proxy_http_version 1.1;
    proxy_cache_bypass $http_upgrade;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection $connection_upgrade;

    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Host $host;
    proxy_set_header X-Forwarded-Port $server_port;
    proxy_set_header X-Request-ID $request_id;

    proxy_connect_timeout 30s;
    proxy_send_timeout 30s;
    proxy_read_timeout 60s;
    proxy_buffering on;
    proxy_buffer_size 4k;
    proxy_buffers 8 4k;
    proxy_busy_buffers_size 8k;
    proxy_temp_file_write_size 64k;

    # ------------------------------------------------------------------------
    # SSL Configuration (shared settings)
    # ------------------------------------------------------------------------
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers 'ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384';
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:50m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;
    ssl_stapling on;
    ssl_stapling_verify on;

    # ------------------------------------------------------------------------
    # Security Headers (shared)
    # ------------------------------------------------------------------------
    map $status $add_security_headers {
        default "1";
    }

    # Map for Connection upgrade (WebSocket support)
    map $http_upgrade $connection_upgrade {
        default upgrade;
        '' close;
    }

    # ------------------------------------------------------------------------
    # Upstream Definitions
    # ------------------------------------------------------------------------
    upstream api_backend {
        least_conn;
        server api:3000 max_fails=3 fail_timeout=30s;
        keepalive 64;
        keepalive_requests 1000;
        keepalive_timeout 60s;
    }

    upstream mcp_backend {
        least_conn;
        server mcp-server:8000 max_fails=3 fail_timeout=30s;
        keepalive 64;
        keepalive_requests 1000;
        keepalive_timeout 60s;
    }

    # ------------------------------------------------------------------------
    # Include Additional Configs
    # ------------------------------------------------------------------------
    include /etc/nginx/conf.d/*.conf;

    # ------------------------------------------------------------------------
    # ------------------------------------------------------------------------
    # SERVER BLOCKS
    # ------------------------------------------------------------------------
    # ------------------------------------------------------------------------

    # ========================================================================
    # HTTP → HTTPS Redirect (when SSL is enabled)
    # ========================================================================
    server {
        listen 80 default_server;
        listen [::]:80 default_server;
        server_name _;

        # ACME challenge for Let's Encrypt
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
            allow all;
        }

        # Redirect all HTTP to HTTPS
        location / {
            return 301 https://$host$request_uri;
        }
    }

    # ========================================================================
    # HTTPS Server — Main Application
    # ========================================================================
    server {
        listen 443 ssl http2;
        listen [::]:443 ssl http2;
        server_name ${NGINX_HOST};

        # ----------------------------------------------------------------
        # SSL Certificates
        # ----------------------------------------------------------------
        # Placeholder: Replace with actual certificate paths after provisioning
        # via Let's Encrypt (certbot) or your certificate provider.
        ssl_certificate /etc/letsencrypt/live/${NGINX_HOST}/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/${NGINX_HOST}/privkey.pem;
        ssl_trusted_certificate /etc/letsencrypt/live/${NGINX_HOST}/chain.pem;

        # Fallback self-signed certificates for initial startup
        # (uncomment below and comment above if certificates are not yet provisioned)
        # ssl_certificate /etc/nginx/ssl/nginx-selfsigned.crt;
        # ssl_certificate_key /etc/nginx/ssl/nginx-selfsigned.key;

        # ----------------------------------------------------------------
        # Security Headers
        # ----------------------------------------------------------------
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: blob: https:; connect-src 'self' https: wss:; frame-ancestors 'none'; base-uri 'self'; form-action 'self';" always;

        # ----------------------------------------------------------------
        # Request ID for tracing
        # ----------------------------------------------------------------
        add_header X-Request-ID $request_id always;

        # ----------------------------------------------------------------
        # Root & Index
        # ----------------------------------------------------------------
        root /var/www/html;
        index index.html index.htm;

        # ----------------------------------------------------------------
        # API Reverse Proxy — /api/v1/*
        # ----------------------------------------------------------------
        location /api/v1/ {
            limit_req zone=api_general burst=20 nodelay;
            limit_req zone=api_strict burst=5 nodelay;
            limit_conn addr 20;

            proxy_pass http://api_backend/api/v1/;
            proxy_redirect off;

            # Extended timeout for long-running API operations
            proxy_read_timeout 120s;
            proxy_send_timeout 120s;

            # Handle preflight requests
            if ($request_method = 'OPTIONS') {
                add_header Access-Control-Allow-Origin $http_origin always;
                add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, PATCH, OPTIONS" always;
                add_header Access-Control-Allow-Headers "Authorization, Content-Type, X-Request-ID, X-API-Key" always;
                add_header Access-Control-Allow-Credentials "true" always;
                add_header Access-Control-Max-Age 86400 always;
                add_header Content-Length 0 always;
                add_header Content-Type text/plain always;
                return 204;
            }

            add_header Access-Control-Allow-Origin $http_origin always;
            add_header Access-Control-Allow-Credentials "true" always;
        }

        # Strict rate-limited API endpoints (auth, sensitive operations)
        location /api/v1/auth/ {
            limit_req zone=api_strict burst=10 nodelay;
            limit_conn addr 10;

            proxy_pass http://api_backend/api/v1/auth/;
            proxy_redirect off;
            proxy_read_timeout 60s;
        }

        # File upload endpoints
        location /api/v1/uploads/ {
            limit_req zone=upload burst=5 nodelay;
            client_max_body_size 100m;

            proxy_pass http://api_backend/api/v1/uploads/;
            proxy_redirect off;
            proxy_request_buffering off;
            proxy_read_timeout 300s;
            proxy_send_timeout 300s;
        }

        # Health check endpoint (no rate limiting)
        location /health {
            access_log off;
            proxy_pass http://api_backend/health;
            proxy_connect_timeout 5s;
            proxy_read_timeout 5s;
        }

        # ----------------------------------------------------------------
        # MCP Server Reverse Proxy — /mcp/v1/*
        # ----------------------------------------------------------------
        location /mcp/v1/ {
            limit_req zone=mcp_general burst=15 nodelay;
            limit_conn addr 15;

            proxy_pass http://mcp_backend/mcp/v1/;
            proxy_redirect off;

            # MCP may have longer-running requests
            proxy_read_timeout 120s;
            proxy_send_timeout 120s;

            # WebSocket support for MCP streaming
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;

            # Handle preflight requests
            if ($request_method = 'OPTIONS') {
                add_header Access-Control-Allow-Origin $http_origin always;
                add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, PATCH, OPTIONS" always;
                add_header Access-Control-Allow-Headers "Authorization, Content-Type, X-Request-ID" always;
                add_header Access-Control-Allow-Credentials "true" always;
                add_header Access-Control-Max-Age 86400 always;
                add_header Content-Length 0 always;
                add_header Content-Type text/plain always;
                return 204;
            }

            add_header Access-Control-Allow-Origin $http_origin always;
            add_header Access-Control-Allow-Credentials "true" always;
        }

        # MCP WebSocket endpoint for real-time MCP communication
        location /mcp/v1/stream {
            limit_req zone=mcp_general burst=30 nodelay;

            proxy_pass http://mcp_backend/mcp/v1/stream;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_read_timeout 86400s;
            proxy_send_timeout 86400s;
        }

        # MCP health check (no rate limiting)
        location /mcp/health {
            access_log off;
            proxy_pass http://mcp_backend/health;
            proxy_connect_timeout 5s;
            proxy_read_timeout 5s;
        }

        # ----------------------------------------------------------------
        # Static Frontend File Serving — /*
        # ----------------------------------------------------------------
        # Static assets with aggressive caching
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot|otf|webmanifest|json)$ {
            expires 1y;
            add_header Cache-Control "public, immutable, max-age=31536000" always;
            add_header X-Frame-Options "SAMEORIGIN" always;
            add_header X-Content-Type-Options "nosniff" always;

            access_log off;
            try_files $uri =404;
        }

        # HTML files (no-cache for SPA routing)
        location ~* \.html$ {
            expires -1;
            add_header Cache-Control "no-cache, no-store, must-revalidate" always;
            add_header Pragma "no-cache" always;
            try_files $uri =404;
        }

        # Service worker (never cache)
        location = /service-worker.js {
            expires -1;
            add_header Cache-Control "no-cache, no-store, must-revalidate" always;
            add_header Service-Worker-Allowed "/" always;
            try_files $uri =404;
        }

        # Catch-all: SPA fallback to index.html
        location / {
            limit_req zone=api_general burst=50 nodelay;

            try_files $uri $uri/ /index.html;

            # Cache control for the SPA shell
            expires -1;
            add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        }

        # ----------------------------------------------------------------
        # Error Pages
        # ----------------------------------------------------------------
        error_page 404 /404.html;
        error_page 500 502 503 504 /50x.html;

        location = /50x.html {
            root /var/www/html;
            internal;
        }

        location = /404.html {
            root /var/www/html;
            internal;
        }

        # ----------------------------------------------------------------
        # Deny Access to Hidden Files
        # ----------------------------------------------------------------
        location ~ /\. {
            deny all;
            access_log off;
            log_not_found off;
        }

        location ~* ^/(README|CHANGELOG|LICENSE|composer\.|package\.|Dockerfile|Makefile) {
            deny all;
            access_log off;
            log_not_found off;
        }
    }

    # ========================================================================
    # Stream Configuration Placeholder (if needed for TCP/UDP proxying)
    # ========================================================================
    # stream {
    #     # Placeholder for any TCP/UDP stream proxying requirements
    # }
}
